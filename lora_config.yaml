# phenomenological-compass LoRA fine-tune config
# mlx-lm 0.31.0 — Ministral-3B

model: "thinkscan/Ministral-3-3B-Instruct-MLX"
train: true
data: "data/training"

# Fine-tune type
fine_tune_type: "lora"
num_layers: 16           # Top 16 layers only — compass behavior lives near the top

# Training
batch_size: 1
grad_accumulation_steps: 2   # Effective batch size of 2
iters: 150                    # ~4 passes through 35 examples — less aggressive
learning_rate: 2.0e-5         # Dropped 5x — 1e-4 diverged on 35 examples
optimizer: "adamw"

# Loss masking — only train on assistant completions, not the prompt
mask_prompt: true

# Evaluation
val_batches: -1              # Use full validation set (9 examples)
steps_per_report: 10
steps_per_eval: 50

# Checkpointing
adapter_path: "adapters"
save_every: 50          # Capture iter-50 optimal — missed it last run

# Context
max_seq_length: 1024

# Reproducibility
seed: 42
