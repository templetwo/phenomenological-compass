# phenomenological-compass LoRA fine-tune config — v0.5
# mlx-lm 0.29.1 — Ministral-3B
#
# v0.5 changes from v0.4:
#   - data: training_v5 — 142 examples from 7 sources (55 v0.4 base + 87 supplements)
#   - 100 OPEN vs 42 WITNESS (121 train / 21 valid)
#   - Same LR (5e-6), same architecture
#   - iters: 200 — more data, same iter budget
#   - Lesson from v0.4: best checkpoint is always iter 50, eval there first

model: "thinkscan/Ministral-3-3B-Instruct-MLX"
train: true
data: "data/training_v5"

# Fine-tune type
fine_tune_type: "lora"
num_layers: 16

# Training
batch_size: 1
grad_accumulation_steps: 2
iters: 200
learning_rate: 5.0e-6
optimizer: "adamw"

# Loss masking
mask_prompt: true

# Evaluation
val_batches: -1
steps_per_report: 5
steps_per_eval: 10

# Checkpointing
adapter_path: "adapters_v5"
save_every: 10

# Context
max_seq_length: 1024

# Reproducibility
seed: 42
