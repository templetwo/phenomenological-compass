# phenomenological-compass LoRA fine-tune config — v0.7
# mlx-lm 0.29.1 — Ministral-3B
#
# v0.7d: Three-signal architecture (OPEN / PAUSE / WITNESS)
#   - HOLD renamed to PAUSE for tokenizer clarity
#     " OPEN" = single token [126872], " HOLD" = [" H","OLD"] (ambiguous)
#     " PAUSE" = [" PA","USE"] — more distinctive first subtoken
#   - data: training_v7 — 365 unique examples, PAUSE 3x oversampled
#   - iters: 500
#   - v7b/v7c: HOLD 0/8 — gradient analysis showed P(HOLD) never >5%

model: "thinkscan/Ministral-3-3B-Instruct-MLX"
train: true
data: "data/training_v7"

# Fine-tune type
fine_tune_type: "lora"
num_layers: 16

# Training
batch_size: 1
grad_accumulation_steps: 2
iters: 500
learning_rate: 5.0e-6
optimizer: "adamw"

# Loss masking
mask_prompt: true

# Evaluation
val_batches: -1
steps_per_report: 5
steps_per_eval: 10

# Checkpointing
adapter_path: "adapters_v7"
save_every: 10

# Context
max_seq_length: 1024

# Reproducibility
seed: 42
