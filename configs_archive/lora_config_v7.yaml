# phenomenological-compass LoRA fine-tune config — v0.7
# mlx-lm 0.29.1 — Ministral-3B
#
# v0.7e: Three-signal architecture (OPEN / PAUSE / WITNESS)
#   - Fixed THRESPAUSE corruption in system prompt → THRESHOLD
#   - PAUSE definition rewritten: removed "threshold" (WITNESS anchor word)
#     now uses "weight"/"territory" — distinct semantic anchor from WITNESS
#   - v7d: PAUSE 2-3/8 (up from 0/8 with HOLD), but PAUSE↔WITNESS confusion
#   - Root cause: system prompt said "THRESPAUSE:" but examples said "THRESHOLD:"
#     + PAUSE/WITNESS definitions both hinged on "threshold" — 3B couldn't separate

model: "thinkscan/Ministral-3-3B-Instruct-MLX"
train: true
data: "data/training_v7"

# Fine-tune type
fine_tune_type: "lora"
num_layers: 16

# Training
batch_size: 1
grad_accumulation_steps: 2
iters: 500
learning_rate: 5.0e-6
optimizer: "adamw"

# Loss masking
mask_prompt: true

# Evaluation
val_batches: -1
steps_per_report: 5
steps_per_eval: 10

# Checkpointing
adapter_path: "adapters_v7"
save_every: 10

# Context
max_seq_length: 1024

# Reproducibility
seed: 42
