# phenomenological-compass LoRA fine-tune config — v0.4
# mlx-lm 0.29.1 — Ministral-3B
#
# v0.4 changes from v0.3:
#   - data: training_v4 (v0.3 + 8 new binary/conditional OPEN examples)
#   - 55 total examples (44 train / 11 valid), 38 OPEN vs 17 WITNESS
#   - Same LR (5e-6) — v0.3 proved this works
#   - iters: 200 — more data means we can train slightly longer
#   - adapter_path: adapters_v4

model: "thinkscan/Ministral-3-3B-Instruct-MLX"
train: true
data: "data/training_v4"

# Fine-tune type
fine_tune_type: "lora"
num_layers: 16           # Top 16 layers only — compass behavior lives near the top

# Training
batch_size: 1
grad_accumulation_steps: 2   # Effective batch size of 2
iters: 200                    # Slightly more iters — 8 more training examples
learning_rate: 5.0e-6         # Same as v0.3 — proven effective
optimizer: "adamw"

# Loss masking — only train on assistant completions, not the prompt
mask_prompt: true

# Evaluation
val_batches: -1              # Use full validation set (11 examples)
steps_per_report: 5
steps_per_eval: 10           # Dense eval — watch for the val loss turn

# Checkpointing
adapter_path: "adapters_v4"
save_every: 10

# Context
max_seq_length: 1024

# Reproducibility
seed: 42
